<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Kontor Wordmark Picker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #080808;
    color: #e8e8e8;
    padding: 60px 56px;
  }
  h1 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #2a2a2a;
    margin-bottom: 56px;
  }
  .version {
    margin-bottom: 56px;
  }
  .version-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #222;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #111;
  }
  .row {
    display: flex;
    gap: 20px;
    align-items: stretch;
    flex-wrap: wrap;
  }
  .swatch {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .canvas {
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 40px;
  }
  .dark  { background: #111; border: 1px solid #1c1c1c; }
  .light { background: #f2f2f2; border: 1px solid #ddd; }
  .tag {
    font-size: 9px;
    color: #222;
    letter-spacing: 0.08em;
    text-align: center;
  }
</style>
</head>
<body>
<h1>Kontor — Wordmark Versions</h1>

<!-- VERSION A: Unified weight — same size K and ontor -->
<div class="version">
  <div class="version-label">A — Unified · same weight, same size</div>
  <div class="row">
    <div class="swatch">
      <div class="canvas dark">
        <svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gA" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <text x="0" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="url(#gA)">K</text>
          <text x="36" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="white">ontor</text>
        </svg>
      </div>
      <div class="tag">dark bg</div>
    </div>
    <div class="swatch">
      <div class="canvas light">
        <svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gAl" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <text x="0" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="url(#gAl)">K</text>
          <text x="36" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="#0f172a">ontor</text>
        </svg>
      </div>
      <div class="tag">light bg</div>
    </div>
  </div>
</div>

<!-- VERSION B: Contrast — bold K, light-weight ontor -->
<div class="version">
  <div class="version-label">B — Contrast · bold K, thin ontor</div>
  <div class="row">
    <div class="swatch">
      <div class="canvas dark">
        <svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gB" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <text x="0" y="48" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="50" font-weight="900" fill="url(#gB)">K</text>
          <text x="38" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="200" fill="white" letter-spacing="2">ontor</text>
        </svg>
      </div>
      <div class="tag">dark bg</div>
    </div>
    <div class="swatch">
      <div class="canvas light">
        <svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gBl" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <text x="0" y="48" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="50" font-weight="900" fill="url(#gBl)">K</text>
          <text x="38" y="46" font-family="'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="200" fill="#374151" letter-spacing="2">ontor</text>
        </svg>
      </div>
      <div class="tag">light bg</div>
    </div>
  </div>
</div>

<!-- VERSION C: All caps, spaced -->
<div class="version">
  <div class="version-label">C — Caps · all uppercase, letter-spaced</div>
  <div class="row">
    <div class="swatch">
      <div class="canvas dark">
        <svg width="320" height="54" viewBox="0 0 320 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gC" x1="0" y1="0" x2="60" y2="54" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <text x="0" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="700" fill="url(#gC)" letter-spacing="4">K</text>
          <text x="50" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="300" fill="white" letter-spacing="8">ONTOR</text>
        </svg>
      </div>
      <div class="tag">dark bg</div>
    </div>
    <div class="swatch">
      <div class="canvas light">
        <svg width="320" height="54" viewBox="0 0 320 54" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gCl" x1="0" y1="0" x2="60" y2="54" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <text x="0" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="700" fill="url(#gCl)" letter-spacing="4">K</text>
          <text x="50" y="42" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="300" fill="#374151" letter-spacing="8">ONTOR</text>
        </svg>
      </div>
      <div class="tag">light bg</div>
    </div>
  </div>
</div>

<!-- VERSION D: Mixed size — large K, smaller ontor baseline-aligned -->
<div class="version">
  <div class="version-label">D — Scale drop · tall K, smaller ontor sitting at cap height</div>
  <div class="row">
    <div class="swatch">
      <div class="canvas dark">
        <svg width="280" height="72" viewBox="0 0 280 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gD" x1="0" y1="0" x2="60" y2="72" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <text x="0" y="60" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="900" fill="url(#gD)">K</text>
          <text x="48" y="58" font-family="'Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="300" fill="white" letter-spacing="3">ontor</text>
        </svg>
      </div>
      <div class="tag">dark bg</div>
    </div>
    <div class="swatch">
      <div class="canvas light">
        <svg width="280" height="72" viewBox="0 0 280 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gDl" x1="0" y1="0" x2="60" y2="72" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <text x="0" y="60" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="900" fill="url(#gDl)">K</text>
          <text x="48" y="58" font-family="'Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="300" fill="#374151" letter-spacing="3">ontor</text>
        </svg>
      </div>
      <div class="tag">light bg</div>
    </div>
  </div>
</div>

</body>
</html>

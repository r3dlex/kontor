<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Kontor Brand</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #080808;
    color: #e8e8e8;
    padding: 60px 56px;
  }
  h1 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #2a2a2a;
    margin-bottom: 56px;
  }
  .row {
    display: flex;
    gap: 20px;
    align-items: stretch;
    flex-wrap: wrap;
  }
  .swatch {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .canvas {
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 40px;
  }
  .dark  { background: #111; border: 1px solid #1c1c1c; }
  .light { background: #f2f2f2; border: 1px solid #ddd; }
  .tag {
    font-size: 9px;
    color: #222;
    letter-spacing: 0.08em;
    text-align: center;
  }
</style>
</head>
<body>
<h1>Kontor — Wordmark</h1>

<div class="row">
  <div class="swatch">
    <div class="canvas dark">
      <svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gDark" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
        <text x="0" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="url(#gDark)">K</text>
        <text x="36" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="white">ontor</text>
      </svg>
    </div>
    <div class="tag">dark bg</div>
  </div>
  <div class="swatch">
    <div class="canvas light">
      <svg width="320" height="60" viewBox="0 0 320 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gLight" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <text x="0" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="url(#gLight)">K</text>
        <text x="36" y="46" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="900" fill="#0f172a">ontor</text>
      </svg>
    </div>
    <div class="tag">light bg</div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kontor Logo Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 48px 24px;
    color: #e8e8e8;
  }
  h1 { font-size: 18px; font-weight: 500; color: #666; margin-bottom: 40px; letter-spacing: 0.08em; text-transform: uppercase; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 220px);
    gap: 20px;
  }
  .card {
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 20px 24px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    gap: 20px;
  }
  .card:hover { border-color: #3b82f6; background: #141414; }
  .card:hover .num { color: #3b82f6; }
  .num {
    font-size: 11px;
    color: #333;
    letter-spacing: 0.1em;
    font-weight: 600;
    transition: color 0.15s;
  }
</style>
</head>
<body>
<h1>Kontor — Choose a Logo</h1>
<div class="grid">

  <!-- 1: Minimal K lettermark -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="#0f1f33"/>
      <text x="16" y="52" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#7dd3fc" letter-spacing="-2">K</text>
    </svg>
    <span class="num">01</span>
  </div>

  <!-- 2: K with AI neural dot accent -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="#0d0d0d"/>
      <line x1="20" y1="14" x2="20" y2="58" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
      <line x1="20" y1="36" x2="50" y2="14" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
      <line x1="20" y1="36" x2="50" y2="58" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
      <circle cx="52" cy="36" r="5" fill="#3b82f6"/>
    </svg>
    <span class="num">02</span>
  </div>

  <!-- 3: K inside hexagon -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <polygon points="36,4 66,20 66,52 36,68 6,52 6,20" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
      <text x="18" y="51" font-family="'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#fff" letter-spacing="-1">K</text>
    </svg>
    <span class="num">03</span>
  </div>

  <!-- 4: Chat bubble K -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect x="6" y="8" width="56" height="44" rx="12" fill="#1a3a5c"/>
      <polygon points="18,52 10,64 30,52" fill="#1a3a5c"/>
      <text x="16" y="44" font-family="'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#7dd3fc">K</text>
    </svg>
    <span class="num">04</span>
  </div>

  <!-- 5: Split K with gradient bar -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="#0a0a0a"/>
      <line x1="22" y1="12" x2="22" y2="60" stroke="#e8e8e8" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="22" y1="36" x2="50" y2="12" stroke="#e8e8e8" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="22" y1="36" x2="50" y2="60" stroke="#e8e8e8" stroke-width="5.5" stroke-linecap="round"/>
      <rect x="6" y="63" width="60" height="3" rx="1.5" fill="url(#g5)"/>
      <defs>
        <linearGradient id="g5" x1="0" y1="0" x2="60" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="num">05</span>
  </div>

  <!-- 6: Rounded square wordmark -->
  <div class="card">
    <svg width="120" height="40" viewBox="0 0 120 40" fill="none">
      <rect width="36" height="36" rx="10" fill="#1a3a5c" y="2"/>
      <text x="5" y="29" font-family="'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#7dd3fc">K</text>
      <text x="44" y="28" font-family="'Helvetica Neue', sans-serif" font-size="20" font-weight="300" fill="#e8e8e8" letter-spacing="1">ontor</text>
    </svg>
    <span class="num">06</span>
  </div>

  <!-- 7: Circuit K -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="#0d1117"/>
      <line x1="20" y1="12" x2="20" y2="60" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="36" x2="48" y2="12" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="36" x2="48" y2="60" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="12" r="3" fill="#22c55e"/>
      <circle cx="20" cy="60" r="3" fill="#22c55e"/>
      <circle cx="20" cy="36" r="3" fill="#22c55e"/>
      <circle cx="48" cy="12" r="3" fill="#22c55e"/>
      <circle cx="48" cy="60" r="3" fill="#22c55e"/>
      <line x1="48" y1="12" x2="58" y2="12" stroke="#22c55e" stroke-width="1.5"/>
      <line x1="48" y1="60" x2="58" y2="60" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="60" cy="12" r="2" fill="#22c55e" opacity="0.5"/>
      <circle cx="60" cy="60" r="2" fill="#22c55e" opacity="0.5"/>
    </svg>
    <span class="num">07</span>
  </div>

  <!-- 8: Bold gradient K -->
  <div class="card">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect width="72" height="72" rx="18" fill="url(#g8bg)"/>
      <text x="12" y="56" font-family="'Arial Black', sans-serif" font-size="52" font-weight="900" fill="white" opacity="0.95">K</text>
      <defs>
        <linearGradient id="g8bg" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#1d4ed8"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="num">08</span>
  </div>

  <!-- 9: Minimal wordmark, no icon -->
  <div class="card">
    <svg width="130" height="44" viewBox="0 0 130 44" fill="none">
      <text x="0" y="36" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#fff" letter-spacing="-1">K</text>
      <text x="34" y="36" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="200" fill="#888" letter-spacing="6">ONTOR</text>
    </svg>
    <span class="num">09</span>
  </div>

</div>
</body>
</html>

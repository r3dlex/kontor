services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kontor_prod
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - default

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "4010:4000"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - default

volumes:
  postgres_data:
